# Configuration with Optional Tasks

version: "1.0"
description: "Workflow with optional tasks"

tasks:
  analyze:
    description: "Analyze code"
    commands:
      - "/analyze"
    timeout: 120

  test:
    description: "Run tests"
    commands:
      - "/test"
    depends-on:
      - analyze
    timeout: 300

  generate-report:
    description: "Generate report"
    commands:
      - "/report"
    depends-on:
      - test
    timeout: 120

  publish:
    description: "Publish results (optional)"
    commands:
      - "/publish"
    depends-on:
      - generate-report
    timeout: 60
    optional: true
